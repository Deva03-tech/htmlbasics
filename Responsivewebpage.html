<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab Timetable</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }
    h1 {
      text-align: center;
      margin: 20px 0;
      font-weight: bold;
    }
    table {
      text-align: center;
    }
    th {
      background-color: #0d6efd;
      color: white;
    }
    td {
      vertical-align: middle;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Lab Timetable</h1>

    <div class="table-responsive">
      <table class="table table-bordered table-striped">
        <thead>
          <tr>
            <th>Day</th>
            <th>9:00 - 10:30</th>
            <th>10:30 - 12:00</th>
            <th>1:00 - 2:30</th>
            <th>2:30 - 4:00</th>
          </tr>
        </thead>

        <tbody>
          <tr>
            <td>Monday</td>
            <td>DS Lab</td>
            <td>DS Lab</td>
            <td>WT Lab</td>
            <td>WT Lab</td>
          </tr>

          <tr>
            <td>Tuesday</td>
            <td>Python Lab</td>
            <td>Python Lab</td>
            <td>-</td>
            <td>-</td>
          </tr>

          <tr>
            <td>Wednesday</td>
            <td>OS Lab</td>
            <td>OS Lab</td>
            <td>DBMS Lab</td>
            <td>DBMS Lab</td>
          </tr>

          <tr>
            <td>Thursday</td>
            <td>-</td>
            <td>-</td>
            <td>Mini Project</td>
            <td>Mini Project</td>
          </tr>

          <tr>
            <td>Friday</td>
            <td>AI Lab</td>
            <td>AI Lab</td>
            <td>-</td>
            <td>-</td>
          </tr>

        </tbody>
      </table>
    </div>
  </div>

</body>
</html>
