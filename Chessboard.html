<!DOCTYPE html>
<html>
<head>
<title>Chess Board</title>

<style>
.board {
    width: 320px;
}

.row {
    display: flex;
}

.box {
    width: 40px;
    height: 40px;
}

.black {
    background: black;
}

.white {
    background: white;
}
</style>

</head>

<body>

<h2>Chess Board Pattern</h2>

<div class="board">

    <!-- Row 1 -->
    <div class="row">
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
    </div>

    <!-- Row 2 -->
    <div class="row">
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
    </div>

    <!-- Row 3 -->
    <div class="row">
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
    </div>

    <!-- Row 4 -->
    <div class="row">
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
    </div>

    <!-- Row 5 -->
    <div class="row">
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
    </div>

    <!-- Row 6 -->
    <div class="row">
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
    </div>

    <!-- Row 7 -->
    <div class="row">
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
    </div>

    <!-- Row 8 -->
    <div class="row">
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
        <div class="box black"></div>
        <div class="box white"></div>
    </div>

</div>

</body>
</html>
