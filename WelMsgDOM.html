<!DOCTYPE html>
<html>
<head>
    <title>DOM Demo</title>

    <script>
        function changeMessage() {
            document.getElementById("h1").innerHTML = "Today is Friday";
        }
    </script>
</head>

<body>

    <h1 id="h1">Today is Thursday</h1>

    <button onclick="changeMessage()">Click Here</button>

</body>
</html>
